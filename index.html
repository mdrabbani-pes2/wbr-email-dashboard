<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBR Email Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f2f2ef; color: #111; padding: 24px; }

  .dashboard-header { background: #fff; border-radius: 14px; padding: 20px 28px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #e5e5e0; }
  .dashboard-header h1 { font-size: 20px; font-weight: 700; color: #111; }
  .dashboard-header .meta { font-size: 12px; color: #999; margin-top: 3px; }
  .refresh-btn { background: #1a3a6b; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .refresh-btn:hover { background: #2a5a9b; }

  .loading { text-align: center; padding: 60px; color: #999; font-size: 14px; }
  .error { text-align: center; padding: 40px; color: #e05a5a; font-size: 14px; background: #fff5f5; border-radius: 12px; margin: 20px 0; }

  /* Section headers */
  .section-title { font-size: 13px; font-weight: 700; color: #1a3a6b; text-transform: uppercase; letter-spacing: 0.8px; margin: 28px 0 12px; padding-left: 4px; }

  /* Chart cards */
  .chart-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .chart-grid-1 { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 16px; }
  .chart-card { background: #fff; border-radius: 14px; border: 1px solid #e5e5e0; padding: 20px 22px; }

  /* KPI summary rows */
  .kpi-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .kpi-card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 14px 18px; }
  .kpi-card .kpi-label { font-size: 11px; color: #888; margin-bottom: 5px; }
  .kpi-card .kpi-value { font-size: 22px; font-weight: 700; color: #111; line-height: 1.2; }
  .kpi-card .kpi-sub { font-size: 11px; color: #999; margin-top: 3px; }
  .kpi-card.blue { border-left: 4px solid #4a90d9; }
  .kpi-card.green { border-left: 4px solid #2d6a2d; }
  .kpi-card.red { border-left: 4px solid #e05a5a; }
  .kpi-card.gray { border-left: 4px solid #aaa; }

  /* Chart internals */
  .chart-title { font-size: 16px; font-weight: 700; color: #111; margin-bottom: 2px; }
  .chart-subtitle { font-size: 11px; color: #999; margin-bottom: 14px; }
  .legend-row { display: flex; gap: 20px; margin-bottom: 12px; font-size: 12px; color: #555; background: #f5f5f0; border-radius: 8px; padding: 8px 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .summary-card { background: #f5f5f0; border: 1px solid #e0e0db; border-radius: 10px; padding: 12px 16px; }
  .summary-card.blue-border { border-left: 4px solid #2d6a2d; }
  .summary-card.forecast-border { border-left: 4px solid #4a90d9; }
  .sc-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .sc-value { font-size: 22px; font-weight: 700; color: #111; }
  .sc-sub { font-size: 11px; color: #999; margin-top: 2px; }
  .chart-wrap { position: relative; height: 300px; }

  /* Cohort table */
  .cohort-wrap { background: #fff; border-radius: 14px; border: 1px solid #e5e5e0; padding: 20px 22px; margin-bottom: 16px; }
  .cohort-table { border-collapse: separate; border-spacing: 3px; width: 100%; table-layout: fixed; }
  .cohort-table th { font-size: 10px; color: #aaa; font-weight: 500; text-align: center; padding: 4px 0; }
  .cohort-table th.left { text-align: left; }
  .cohort-table td { font-size: 10px; font-weight: 600; text-align: center; padding: 8px 2px; border-radius: 8px; }
  .cohort-table td.lbl { color: #222; font-weight: 700; font-size: 11px; text-align: left; background: none !important; }
  .cohort-table td.ags { color: #bbb; font-weight: 400; font-size: 10px; text-align: right; background: none !important; padding-right: 4px; }
  .cohort-table td.empty { background: none !important; }
  .legend-bar-wrap { margin: 12px 0 4px; }
  .legend-bar { height: 8px; width: 280px; border-radius: 5px; background: linear-gradient(to right, #cfe0f2, #1a3a6b); }
  .legend-bar-labels { display: flex; justify-content: space-between; width: 280px; font-size: 10px; color: #aaa; margin-top: 3px; }
  .cohort-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 14px; border-top: 1px solid #eee; padding-top: 14px; }
  .cs-card .cs-lbl { font-size: 10px; color: #aaa; margin-bottom: 3px; }
  .cs-card .cs-val { font-size: 18px; font-weight: 700; color: #111; }
  .cs-card .cs-sub { font-size: 10px; color: #aaa; margin-top: 2px; }
</style>
</head>
<body>

<div class="dashboard-header">
  <div>
    <h1>📧 WBR Email Dashboard</h1>
    <div class="meta" id="lastUpdated">Loading data from Google Sheet...</div>
  </div>
  <button class="refresh-btn" onclick="loadAllData()">🔄 Refresh Data</button>
</div>

<div id="mainContent"><div class="loading">⏳ Fetching latest data from Google Sheet...</div></div>

<script>
// ─────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────
const SHEET_ID = '1V42IY30Dt2tBgBhmxHW6ZapNa1r0xXJN4COX5smHtvk';
const SHEETS = { wow: 'WoW_Data', mom: 'MoM_Data', cohort: 'Cohort_Data' };

// ─────────────────────────────────────────────────────────
// FETCH SHEET DATA
// ─────────────────────────────────────────────────────────
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function num(v) { const n = parseFloat(v); return isNaN(n) ? null : n; }

// ─────────────────────────────────────────────────────────
// PILL PLUGIN (reusable)
// ─────────────────────────────────────────────────────────
function makePillPlugin(datasets) {
  return {
    id: 'pills_' + Math.random(),
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      const chartArea = chart.chartArea;
      const placed = [];
      datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        const borderColor = ds.pillBorder || '#4a90d9';
        const textColor = ds.pillText || '#1a5fa8';
        const fmt = ds.pillFmt || (v => v);
        meta.data.forEach((pt, i) => {
          const val = ds.data[i];
          if (val === null || val === undefined) return;
          const text = fmt(val);
          ctx.save(); ctx.font = '600 9px sans-serif';
          const pw = ctx.measureText(text).width + 12;
          const ph = 16;
          let cx = pt.x, cy = pt.y - 14;
          if (cx - pw/2 < chartArea.left) cx = chartArea.left + pw/2;
          if (cx + pw/2 > chartArea.right) cx = chartArea.right - pw/2;
          let att = 0, moved = true;
          while (moved && att < 8) { moved = false; for (const p of placed) { if (Math.abs(p.cx-cx) < pw && Math.abs(p.cy-cy) < ph) { cy = p.cy - ph - 2; moved = true; } } att++; }
          if (cy - ph/2 < chartArea.top) cy = pt.y + 16;
          ctx.restore();
          placed.push({ cx, cy });
          drawPill(ctx, text, cx, cy, borderColor, textColor);
        });
      });
    }
  };
}

function drawPill(ctx, text, cx, cy, border, textColor) {
  const FONT = '600 10px Helvetica, Arial, sans-serif';
  ctx.save();
  ctx.font = FONT;
  const tw = ctx.measureText(text).width;
  const px = 5, py = 3, r = 6;
  const pw = tw + px*2, ph = 10 + py*2;
  const x = cx - pw/2, y = cy - ph/2;
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+pw-r,y); ctx.quadraticCurveTo(x+pw,y,x+pw,y+r);
  ctx.lineTo(x+pw,y+ph-r); ctx.quadraticCurveTo(x+pw,y+ph,x+pw-r,y+ph);
  ctx.lineTo(x+r,y+ph); ctx.quadraticCurveTo(x,y+ph,x,y+ph-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = border; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.font = FONT;
  ctx.fillStyle = textColor; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, cx, cy + 0.5);
  ctx.restore();
}

function drawPillFixed(ctx, text, cx, cy, pillBg, pillStroke, textColor, ca) {
  const FONT = '600 10px Helvetica, Arial, sans-serif';
  ctx.save();
  ctx.font = FONT;
  const tw = ctx.measureText(text).width;
  const px = 6, py = 3, r = 5;
  const pw = tw + px*2, ph = 10 + py*2;
  if (cx - pw/2 < ca.left + 2) cx = ca.left + pw/2 + 2;
  if (cx + pw/2 > ca.right - 2) cx = ca.right - pw/2 - 2;
  const x = cx - pw/2, yy = cy - ph/2;
  ctx.beginPath();
  ctx.moveTo(x+r,yy); ctx.lineTo(x+pw-r,yy); ctx.quadraticCurveTo(x+pw,yy,x+pw,yy+r);
  ctx.lineTo(x+pw,yy+ph-r); ctx.quadraticCurveTo(x+pw,yy+ph,x+pw-r,yy+ph);
  ctx.lineTo(x+r,yy+ph); ctx.quadraticCurveTo(x,yy+ph,x,yy+ph-r);
  ctx.lineTo(x,yy+r); ctx.quadraticCurveTo(x,yy,x+r,yy); ctx.closePath();
  ctx.fillStyle = pillBg; ctx.fill();
  ctx.strokeStyle = pillStroke; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.font = FONT;
  ctx.fillStyle = textColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, cx, cy + 0.5);
  ctx.restore();
}

function barPillPlugin(actualData, planData, fmtFn) {
  return {
    id: 'barpills_' + Math.random(),
    afterDatasetsDraw(chart) {
      const { ctx, chartArea: ca, scales: { y } } = chart;
      const barMeta = chart.getDatasetMeta(0);
      const lineMeta = chart.getDatasetMeta(1);
      const placed = [];
      barMeta.data.forEach((bar, i) => {
        const val = actualData[i];
        if (val === null || val === undefined) return;
        const text = fmtFn(val);
        const barBottom = y.getPixelForValue(0);
        const cy = barBottom - 12;
        placed.push({ cx: bar.x, cy });
        drawPillFixed(ctx, text, bar.x, cy, '#222222', '#222222', '#ffffff', ca);
      });
      lineMeta.data.forEach((point, i) => {
        const val = planData[i];
        if (val === null || val === undefined) return;
        const text = fmtFn(val);
        const FONT = '600 10px Helvetica, Arial, sans-serif';
        ctx.font = FONT;
        const pw = ctx.measureText(text).width + 14;
        let cy = point.y - 16;
        for (const p of placed) { if (Math.abs(p.cx - point.x) < pw && Math.abs(cy - p.cy) < 17) cy = p.cy - 18; }
        if (cy - 10 < ca.top) cy = point.y + 16;
        placed.push({ cx: point.x, cy });
        drawPillFixed(ctx, text, point.x, cy, '#ffffff', '#4a90d9', '#1a5fa8', ca);
      });
    }
  };
}

// ─────────────────────────────────────────────────────────
// CHART BUILDERS
// ─────────────────────────────────────────────────────────
function baseLineOpts(yLabel, yMin, yMax, yStep, yFmt) {
  return {
    responsive: true, maintainAspectRatio: false,
    layout: { padding: { top: 28, left: 4, right: 20, bottom: 4 } },
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => yFmt(ctx.parsed.y) } } },
    scales: {
      x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { autoSkip: false, maxRotation: 0, font: { size: 10 }, color: '#999' }, border: { color: '#e5e5e0' } },
      y: { min: yMin, max: yMax, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { stepSize: yStep, callback: v => yFmt(v), font: { size: 10 }, color: '#999' }, title: { display: true, text: yLabel, font: { size: 10 }, color: '#999' }, border: { color: '#e5e5e0' } }
    }
  };
}

function makeYoYDatasets(data2025, data2026) {
  return [
    { label: '2025', data: data2025, borderColor: '#4a90d9', borderWidth: 2, borderDash: [6,4], pointBackgroundColor: '#4a90d9', pointRadius: 4, tension: 0.4, fill: false, pillBorder: '#4a90d9', pillText: '#1a5fa8' },
    { label: '2026', data: data2026, borderColor: '#e05a5a', borderWidth: 2, borderDash: [6,4], pointBackgroundColor: '#e05a5a', pointRadius: 4, tension: 0.4, fill: false, spanGaps: false, pillBorder: '#e05a5a', pillText: '#c03030' }
  ];
}

function makeWoWDataset(data, color) {
  return [{ label: 'Value', data, borderColor: color, borderWidth: 2, borderDash: [6,4], pointBackgroundColor: color, pointRadius: 4, tension: 0.4, fill: false, pillBorder: color, pillText: color === '#4a90d9' ? '#1a5fa8' : '#c03030' }];
}

// ─────────────────────────────────────────────────────────
// COHORT COLOR
// ─────────────────────────────────────────────────────────
function cohortColor(val, min, max) {
  const t = Math.max(0, Math.min(1, (val - min) / (max - min)));
  const l = { r:207, g:224, b:242 }, d = { r:26, g:58, b:107 };
  return `rgb(${Math.round(l.r+t*(d.r-l.r))},${Math.round(l.g+t*(d.g-l.g))},${Math.round(l.b+t*(d.b-l.b))})`;
}
function cohortText(val, min, max) { return (val - min) / (max - min) > 0.25 ? '#fff' : '#1a3a6b'; }

// ─────────────────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────────────────
async function loadAllData() {
  document.getElementById('mainContent').innerHTML = '<div class="loading">⏳ Fetching latest data from Google Sheet...</div>';
  
  try {
    const [wowRaw, momRaw, cohortRaw] = await Promise.all([
      fetchSheet(SHEETS.wow), fetchSheet(SHEETS.mom), fetchSheet(SHEETS.cohort)
    ]);

    // Parse WoW
    const wowRows = wowRaw.slice(1).filter(r => r[0] && !r[0].includes('ADD NEW') && r[1]);
    const wowLabels = wowRows.map(r => r[0]);
    const wowSent = wowRows.map(r => num(r[1]));
    const wowDel = wowRows.map(r => num(r[2]));
    const wowOpen = wowRows.map(r => num(r[3]));
    const wowCtr = wowRows.map(r => num(r[4]));
    const wowTickets = wowRows.map(r => num(r[5]));
    const latestWow = wowRows[wowRows.length - 1];
    const prevWow = wowRows[wowRows.length - 2];

    // Parse MoM
    const momRows = momRaw.slice(1).filter(r => r[0] && !r[0].includes('ADD NEW') && r[1]);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const rows25 = momRows.filter(r => r[1] === '2025');
    const rows26 = momRows.filter(r => r[1] === '2026');

    function momSeries(rows, col) { return months.map(m => { const r = rows.find(x => x[0].trim() === m); return r ? num(r[col]) : null; }); }

    const sent25 = momSeries(rows25, 2); const sent26 = momSeries(rows26, 2);
    const del25 = momSeries(rows25, 4);  const del26 = momSeries(rows26, 4);
    const open25 = momSeries(rows25, 6); const open26 = momSeries(rows26, 6);
    const ctr25 = momSeries(rows25, 8);  const ctr26 = momSeries(rows26, 8);
    const lcMrr26 = momSeries(rows26, 11);
    const ipMrr26 = momSeries(rows26, 12);
    const arpa25 = momSeries(rows25, 16); const arpa26 = momSeries(rows26, 16);
    const tickets26 = momSeries(rows26, 13);

    // Parse Cohort
    const cohortRows = cohortRaw.slice(1).filter(r => r[0] && r[0].trim());
    const cohortVals = cohortRows.map(r => ({ label: r[0], ag: r[1], vals: r.slice(2).map(v => num(v)) }));
    const allCohortNums = cohortVals.flatMap(c => c.vals.filter(v => v !== null));
    const cMin = Math.min(...allCohortNums), cMax = Math.max(...allCohortNums);

    // Latest values for KPIs
    const latestMom26 = rows26[rows26.length - 1];
    const prevMom26 = rows26[rows26.length - 2];

    // Update last updated
    document.getElementById('lastUpdated').textContent = `Last refreshed: ${new Date().toLocaleString()} · ${wowRows.length} weeks · ${momRows.length} months`;

    // ── BUILD HTML ──
    document.getElementById('mainContent').innerHTML = buildHTML();

    // ── RENDER CHARTS ──
    renderAllCharts();

    function buildHTML() {
      const latestWeek = latestWow[0];
      const wowChange = prevWow[1] ? (((num(latestWow[1]) / num(prevWow[1])) - 1) * 100).toFixed(1) : '—';
      const wowChangeStr = wowChange > 0 ? `↑ +${wowChange}% vs prev` : `↓ ${wowChange}% vs prev`;
      const wowPeak = Math.max(...wowSent.filter(v=>v));
      const wowPeakWeek = wowLabels[wowSent.indexOf(wowPeak)];
      const wow12avg = (wowSent.slice(-12).reduce((a,b)=>a+(b||0),0)/Math.min(12,wowSent.length)).toFixed(1);

      return `
      <!-- WoW KPIs -->
      <div class="section-title">📅 Week-over-Week (Latest: ${latestWeek})</div>
      <div class="kpi-row">
        <div class="kpi-card blue"><div class="kpi-label">Peak week (Emails Sent)</div><div class="kpi-value">${wowPeak}M</div><div class="kpi-sub">w/c ${wowPeakWeek}</div></div>
        <div class="kpi-card red"><div class="kpi-label">Latest (${latestWeek})</div><div class="kpi-value">${num(latestWow[1])}M</div><div class="kpi-sub">${wowChangeStr}</div></div>
        <div class="kpi-card gray"><div class="kpi-label">12-week avg</div><div class="kpi-value">${wow12avg}M</div><div class="kpi-sub">Mar–May</div></div>
      </div>

      <!-- WoW Charts Row 1 -->
      <div class="chart-grid-2">
        <div class="chart-card">
          <div class="chart-title">Emails Sent — WoW Trend</div>
          <div class="chart-subtitle">Weekly volume (M) · ${wowLabels[0]} – ${wowLabels[wowLabels.length-1]}</div>
          <div class="chart-wrap"><canvas id="wowSentChart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Delivered % — WoW Trend</div>
          <div class="chart-subtitle">Weekly delivery rate · ${wowLabels[0]} – ${wowLabels[wowLabels.length-1]}</div>
          <div class="chart-wrap"><canvas id="wowDelChart"></canvas></div>
        </div>
      </div>

      <!-- WoW Charts Row 2 -->
      <div class="chart-grid-2">
        <div class="chart-card">
          <div class="chart-title">Opened % — WoW Trend</div>
          <div class="chart-subtitle">Weekly open rate · ${wowLabels[0]} – ${wowLabels[wowLabels.length-1]}</div>
          <div class="chart-wrap"><canvas id="wowOpenChart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Click % — WoW Trend</div>
          <div class="chart-subtitle">Weekly CTR · ${wowLabels[0]} – ${wowLabels[wowLabels.length-1]}</div>
          <div class="chart-wrap"><canvas id="wowCtrChart"></canvas></div>
        </div>
      </div>

      <!-- WoW Support Tickets -->
      <div class="chart-grid-1">
        <div class="chart-card">
          <div class="chart-title">Support Tickets — WoW Trend</div>
          <div class="chart-subtitle">Weekly ticket count · ${wowLabels[0]} – ${wowLabels[wowLabels.length-1]}</div>
          <div class="chart-wrap"><canvas id="wowTicketsChart"></canvas></div>
        </div>
      </div>

      <!-- MoM Section -->
      <div class="section-title">📆 Month-over-Month (2025 vs 2026)</div>
      <div class="chart-grid-2">
        <div class="chart-card">
          <div class="legend-row"><span><span class="legend-dot" style="background:#4a90d9"></span>2025</span><span><span class="legend-dot" style="background:#e05a5a"></span>2026</span></div>
          <div class="chart-title">Emails Sent — YoY Trend</div>
          <div class="chart-subtitle">Monthly volume (M)</div>
          <div class="chart-wrap"><canvas id="momSentChart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="legend-row"><span><span class="legend-dot" style="background:#4a90d9"></span>2025</span><span><span class="legend-dot" style="background:#e05a5a"></span>2026</span></div>
          <div class="chart-title">Delivered % — YoY Trend</div>
          <div class="chart-subtitle">Monthly delivery rate</div>
          <div class="chart-wrap"><canvas id="momDelChart"></canvas></div>
        </div>
      </div>
      <div class="chart-grid-2">
        <div class="chart-card">
          <div class="legend-row"><span><span class="legend-dot" style="background:#4a90d9"></span>2025</span><span><span class="legend-dot" style="background:#e05a5a"></span>2026</span></div>
          <div class="chart-title">Opened % — YoY Trend</div>
          <div class="chart-subtitle">Monthly open rate</div>
          <div class="chart-wrap"><canvas id="momOpenChart"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="legend-row"><span><span class="legend-dot" style="background:#4a90d9"></span>2025</span><span><span class="legend-dot" style="background:#e05a5a"></span>2026</span></div>
          <div class="chart-title">Click % — YoY Trend</div>
          <div class="chart-subtitle">Monthly CTR</div>
          <div class="chart-wrap"><canvas id="momCtrChart"></canvas></div>
        </div>
      </div>

      <!-- Revenue Section -->
      <div class="section-title">💰 Revenue</div>
      <div class="chart-grid-2">
        <div class="chart-card">
          <div class="chart-title">LC Email Revenue — Actual vs. Forecasted MRR</div>
          <div class="chart-subtitle">Jan 2026 · Dec 2026 · MRR in Mn $</div>
          <div class="summary-cards">

    function renderAllCharts() {

      new Chart('lcMrrChart', {
        data: { labels: momLabels26, datasets: [
          { type:'bar', label:'Actual', data:lcActual26, backgroundColor:'#2d6a2d', borderRadius:3, barPercentage:0.6, order:2 },
          { type:'line', label:'Forecast', data:lcPlan, borderColor:'#4a90d9', borderWidth:2, borderDash:[6,5], pointRadius:lcPlan.map((_,i)=>lcActual26[i]!==null?5:4), pointBackgroundColor:lcPlan.map((_,i)=>lcActual26[i]!==null?'#fff':'#4a90d9'), pointBorderColor:'#4a90d9', pointBorderWidth:2, tension:0.4, spanGaps:true, fill:false, order:1 }

        options: { responsive:true, maintainAspectRatio:false, layout:{padding:{top:35,left:4,right:4,bottom:4}}, plugins:{legend:{display:false}}, scales:{ x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:9},color:'#999'},border:{color:'#e5e5e0'}}, y:{min:0,max:2.0,grid:{color:'rgba(0,0,0,0.05)'},ticks:{stepSize:0.2,callback:v=>'$'+v.toFixed(1)+'M',font:{size:9},color:'#999'},border:{color:'#e5e5e0'}} } },
        plugins: [barPillPlugin(lcActual26, lcPlan, v => '$' + v.toFixed(2) + 'M')]

      new Chart('ipMrrChart', {

          { type:'line', label:'Forecast', data:ipPlan, borderColor:'#4a90d9', borderWidth:2, borderDash:[6,5], pointRadius:ipPlan.map((_,i)=>ipActual26[i]!==null?5:4), pointBackgroundColor:ipPlan.map((_,i)=>ipActual26[i]!==null?'#fff':'#4a90d9'), pointBorderColor:'#4a90d9', pointBorderWidth:2, tension:0.4, spanGaps:true, fill:false, order:1 }
        ]},
        options: { responsive:true, maintainAspectRatio:false, layout:{padding:{top:35,left:4,right:4,bottom:4}}, plugins:{legend:{display:false}}, scales:{ x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:9},color:'#999'},border:{color:'#e5e5e0'}}, y:{min:0,max:120,grid:{color:'rgba(0,0,0,0.05)'},ticks:{stepSize:20,callback:v=>'$'+v+'K',font:{size:9},color:'#999'},border:{color:'#e5e5e0'}} } },

      // ── ARPA ──

      // ── COHORT TABLE ──

      const tbody=document.createElement('tbody');

  } catch(e) {

}
